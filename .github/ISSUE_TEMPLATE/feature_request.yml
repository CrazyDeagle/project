name: Feature request
description: Suggest a new capability, training mode, or API.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is asking for it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketch the API or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they were rejected.
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: |
        Is this a breaking change to checkpoints or the CUDA ABI?
        Does it require new dependencies?
