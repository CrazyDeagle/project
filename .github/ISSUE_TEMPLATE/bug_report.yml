name: Bug report
description: Report something that is broken or behaves incorrectly.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail
        for someone else to reproduce the issue on a fresh checkout.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimum command(s) needed to reproduce. Include the full traceback if any.
      render: shell
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse HEAD` or the release tag you observed it on.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please paste the output of:
        ```
        python -c "import torch; print(torch.__version__, torch.version.cuda)"
        nvidia-smi | head
        ```
      render: shell
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else relevant — workarounds you tried, suspected cause, related issues.
