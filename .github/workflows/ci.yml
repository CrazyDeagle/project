name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.5.0"

      - name: Ruff check
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy and stubs
        run: pip install "mypy>=1.8" types-setuptools

      - name: Run mypy
        run: mypy silexcode --no-incremental || true
        # Non-blocking until the type-clean baseline is established.

  test:
    name: CPU tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only torch
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1"

      - name: Install dev dependencies
        run: pip install "pytest>=7.4" "numpy>=1.24"

      # We do not build the CUDA extension in CI; tests marked with the `cuda`
      # marker are skipped automatically when the extension is missing.
      - name: Run pytest (non-CUDA)
        env:
          SILEX_SKIP_CUDA_BUILD: "1"
        run: pytest -q -m "not cuda" || pytest -q

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build source distribution
        run: |
          pip install build
          SILEX_SKIP_CUDA_BUILD=1 python -m build --sdist || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: ignore
